<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Carta</title>
  <!--
    Imagen central (tu carta / diseño):

    Guardá cualquier archivo como  assets/carta.png  (podés pisar el actual),
    O cambiá la ruta en el tag <img> abajo — ej. assets/mi-diseno.webp

    El visitante sólo ve; no puede editar nada desde la página.

    Wallpaper de fondo: editá las URLs del <video> más abajo si querés otro clip.
  -->
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: #1a1612;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* Fondo vídeo fullscreen */
    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .backdrop video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.06) brightness(0.92);
    }

    .backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        rgba(20, 16, 12, 0.16),
        rgba(12, 10, 8, 0.52));
      pointer-events: none;
    }

    /* Imagen centrada sobre el vídeo — ocupa bastante pantalla pero sin recortarse */
    main {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: max(14px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(18px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }

    .letter-shell {
      margin: 0;
      /* Más grande que antes; el navegador ajusta con max-width + max-height */
      max-width: min(680px, 94vw);
      max-height: min(92dvh, 92vh);
      width: fit-content;
      filter: drop-shadow(0 clamp(10px, 3vw, 18px) clamp(26px, 7vw, 46px) rgba(0, 0, 0, 0.5));
      user-select: none;
      -webkit-user-select: none;
    }

    .letter-shell img {
      display: block;
      vertical-align: top;
      /* Ancho alto en pantalla: prioridad ancho hasta tope; limita alto al viewport */
      width: clamp(260px, 88vw, 680px);
      max-width: 100%;
      height: auto;
      max-height: min(92dvh, 92vh);
      object-fit: contain;
      pointer-events: none;
      -webkit-user-drag: none;
      image-rendering: auto;
      image-rendering: high-quality;
      image-rendering: -webkit-optimize-contrast;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    @media (min-width: 900px) {
      .letter-shell {
        max-width: min(760px, 88vw);
      }

      .letter-shell img {
        width: clamp(420px, 52vw, 760px);
      }
    }

    /* Teléfonos muy bajitos en alto */
    @media (max-height: 520px) and (orientation: landscape) {
      .letter-shell {
        max-height: min(96dvh, 96vh);
      }

      .letter-shell img {
        max-height: min(96dvh, 96vh);
        width: auto;
      }
    }
  </style>
</head>

<body>
  <div class="backdrop" aria-hidden="true">
    <video autoplay muted loop playsinline preload="metadata">
      <!-- Preview oficial — Autumn River Pixel (Moewalls) -->
      <source src="https://moewalls.com/wp-content/uploads/preview/2024/autumn-river-pixel-preview.webm" type="video/webm" />
    </video>
  </div>

  <main role="main">
    <figure class="letter-shell" aria-label="Carta">
      <!-- Tu imagen terminada va aquí: reemplazá el archivo assets/carta.png o cambiá el src -->
      <img src="assets/imagen.png" alt="" width="1000" height="1067" decoding="sync" fetchpriority="high" loading="eager" />
    </figure>
  </main>

  <script>
    document.querySelector("video")?.play().catch(() => {});
  </script>
</body>

</html>
